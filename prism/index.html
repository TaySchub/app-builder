<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<meta name="theme-color" content="#101015" />
<title>Prism — mix the color</title>
<style>
  :root{
    --bg:#101015; --panel:#1a1a22; --ink:#f4f4f8; --muted:#9a9aae; --line:#2a2a36;
    --accent:#ffd166; --good:#5ad19a; --bad:#ff6b8a;
    --tap:44px; --font:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
  }
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
  html,body{margin:0;height:100%}
  body{
    background:var(--bg); color:var(--ink); font-family:var(--font);
    display:flex; flex-direction:column; min-height:100dvh; overflow:hidden;
  }
  header{display:flex; align-items:center; gap:10px; padding:12px 14px}
  header h1{font-size:16px; margin:0; letter-spacing:2px; font-weight:800}
  header .sub{color:var(--muted); font-size:11px}
  .spacer{flex:1}
  button.icon{width:var(--tap);height:var(--tap);min-width:var(--tap);border-radius:12px;
    border:1px solid var(--line); background:var(--panel); color:var(--ink); font-size:18px; cursor:pointer;
    display:grid;place-items:center;}
  button.icon:focus-visible,.btn:focus-visible,input[type=range]:focus-visible{outline:3px solid var(--accent);outline-offset:3px}
  .hud{display:flex; gap:16px; padding:0 16px 6px; color:var(--muted); font-size:13px}
  .hud b{color:var(--ink); font-variant-numeric:tabular-nums}
  .timebar{height:6px; background:var(--panel); margin:2px 16px 10px; border-radius:99px; overflow:hidden}
  .timebar > i{display:block; height:100%; width:100%; background:linear-gradient(90deg,var(--good),var(--accent)); transition:width .25s linear}
  main{flex:1; display:flex; flex-direction:column; padding:0 16px 16px; gap:14px; min-height:0}
  .swatches{display:flex; gap:14px; flex:1; min-height:120px}
  .sw{flex:1; border-radius:18px; position:relative; display:grid; place-items:end center;
      box-shadow:inset 0 0 0 1px #ffffff14, 0 10px 30px #0006; overflow:hidden}
  .sw span{font-size:11px; letter-spacing:1px; color:#0007; background:#fff8; padding:3px 8px;
      border-radius:99px; margin-bottom:10px; font-weight:700}
  .sliders{display:flex; flex-direction:column; gap:14px}
  .row{display:flex; align-items:center; gap:12px}
  .row label{width:18px; font-weight:800; font-size:15px}
  .row .val{width:34px; text-align:right; color:var(--muted); font-variant-numeric:tabular-nums; font-size:13px}
  input[type=range]{flex:1; height:var(--tap); -webkit-appearance:none; appearance:none; background:transparent; cursor:pointer}
  input[type=range]::-webkit-slider-runnable-track{height:10px; border-radius:99px}
  input[type=range]::-moz-range-track{height:10px; border-radius:99px}
  #r::-webkit-slider-runnable-track{background:linear-gradient(90deg,#300,#f33)}
  #g::-webkit-slider-runnable-track{background:linear-gradient(90deg,#030,#3f3)}
  #b::-webkit-slider-runnable-track{background:linear-gradient(90deg,#003,#3af)}
  #r::-moz-range-track{background:linear-gradient(90deg,#300,#f33)}
  #g::-moz-range-track{background:linear-gradient(90deg,#030,#3f3)}
  #b::-moz-range-track{background:linear-gradient(90deg,#003,#3af)}
  input[type=range]::-webkit-slider-thumb{-webkit-appearance:none;width:26px;height:26px;border-radius:50%;
    background:#fff;border:3px solid #0006;margin-top:-8px;box-shadow:0 2px 8px #0007}
  input[type=range]::-moz-range-thumb{width:24px;height:24px;border-radius:50%;background:#fff;border:3px solid #0006}
  .btn{appearance:none;border:0;cursor:pointer;font-family:inherit;font-weight:800;letter-spacing:.5px;
    background:linear-gradient(180deg,var(--accent),#f0b73c); color:#241c00;
    padding:15px; border-radius:14px; font-size:17px; min-height:var(--tap); width:100%}
  .btn:active{transform:translateY(1px)}
  .feedback{text-align:center; min-height:20px; font-size:14px; font-weight:700; color:var(--muted)}
  .overlay{position:fixed; inset:0; display:grid; place-items:center; background:#101015cc; z-index:5}
  .overlay.hidden{display:none}
  .card{background:linear-gradient(180deg,#1f1f29,#15151c); border:1px solid var(--line); border-radius:20px;
    padding:26px; text-align:center; width:min(360px,86vw)}
  .card h2{margin:0 0 6px; font-size:28px; letter-spacing:1px}
  .card p{margin:6px 0 18px; color:var(--muted); font-size:14px; line-height:1.5}
  @media (prefers-reduced-motion: reduce){ *{transition:none!important; animation:none!important} }
  @keyframes pop{0%{transform:scale(1)}40%{transform:scale(1.06)}100%{transform:scale(1)}}
  .pop{animation:pop .35s ease}
</style>
</head>
<body>
<header>
  <h1>PRISM</h1><span class="sub">mix the color</span>
  <div class="spacer"></div>
  <button class="icon" id="mute" aria-label="Toggle sound">🔊</button>
</header>
<div class="hud">
  <div>Score <b id="score">0</b></div>
  <div>Streak <b id="streak">0</b></div>
  <div>Best <b id="best">0</b></div>
</div>
<div class="timebar"><i id="tbar"></i></div>

<main>
  <div class="swatches">
    <div class="sw" id="target" aria-label="Target color"><span>TARGET</span></div>
    <div class="sw" id="mix" aria-label="Your mix"><span>YOURS</span></div>
  </div>
  <div class="feedback" id="fb">Match the target. Closer = more points.</div>
  <div class="sliders">
    <div class="row"><label for="r" style="color:#ff6b6b">R</label><input id="r" type="range" min="0" max="255" value="128" aria-label="Red"><span class="val" id="rv">128</span></div>
    <div class="row"><label for="g" style="color:#6bff8e">G</label><input id="g" type="range" min="0" max="255" value="128" aria-label="Green"><span class="val" id="gv">128</span></div>
    <div class="row"><label for="b" style="color:#6bb8ff">B</label><input id="b" type="range" min="0" max="255" value="128" aria-label="Blue"><span class="val" id="bv">128</span></div>
  </div>
  <button class="btn" id="lock">Lock it in</button>
</main>

<div class="overlay" id="overlay" role="dialog" aria-modal="true">
  <div class="card">
    <h2 id="ttl">PRISM</h2>
    <p id="body">A target color appears. Slide R, G and B until <b>your mix matches</b>. The closer you get, the more points — and a near-perfect match adds bonus time. 60 seconds. Go for a streak!</p>
    <button class="btn" id="play">Start</button>
  </div>
</div>

<script>
/* =====================================================================
   PRISM — color-mixing perception game.
   Match a target RGB color with three sliders before the clock runs out.
   Closeness is scored continuously; a high match grants a time bonus and
   keeps your streak alive. Calm but lightly timed. Offline, single file.
   ===================================================================== */
(function(){
  "use strict";
  const $=id=>document.getElementById(id);
  const store={get(k,d){try{const v=localStorage.getItem(k);return v==null?d:JSON.parse(v);}catch(e){return d;}},
               set(k,v){try{localStorage.setItem(k,JSON.stringify(v));}catch(e){}}};
  const reduceMotion=matchMedia("(prefers-reduced-motion: reduce)").matches;

  // ---------- audio ----------
  const Sound=(()=>{
    let ctx=null,muted=store.get("prism.muted",false);
    const ac=()=>{if(!ctx){try{ctx=new(window.AudioContext||window.webkitAudioContext)();}catch(e){}}return ctx;};
    function tone(f,dur=0.12,type="sine",vol=0.15){
      if(muted)return;const c=ac();if(!c)return;const o=c.createOscillator(),g=c.createGain();
      o.type=type;o.frequency.value=f;o.connect(g);g.connect(c.destination);const t=c.currentTime;
      g.gain.setValueAtTime(0.0001,t);g.gain.exponentialRampToValueAtTime(vol,t+0.01);
      g.gain.exponentialRampToValueAtTime(0.0001,t+dur);o.start(t);o.stop(t+dur+0.02);
    }
    return{
      tick(){tone(300,0.04,"square",0.05);},
      good(q){ const base=440+q*4; [base,base*1.25,base*1.5].forEach((f,i)=>setTimeout(()=>tone(f,0.16,"sine",0.14),i*70)); },
      meh(){ tone(220,0.18,"triangle",0.12); },
      end(){ [392,330,262].forEach((f,i)=>setTimeout(()=>tone(f,0.22,"sine",0.14),i*120)); },
      toggle(){muted=!muted;store.set("prism.muted",muted);return muted;},get muted(){return muted;},
      resume(){const c=ac();if(c&&c.state==="suspended")c.resume();}
    };
  })();
  const haptic=ms=>{try{if(navigator.vibrate)navigator.vibrate(ms);}catch(e){}};
  const muteBtn=$("mute");
  const paintMute=()=>muteBtn.textContent=Sound.muted?"🔇":"🔊"; paintMute();
  muteBtn.addEventListener("click",()=>{Sound.toggle();paintMute();haptic(8);});

  // ---------- state ----------
  let target={r:0,g:0,b:0}, score=0, streak=0, best=store.get("prism.best",0);
  let timeLeft=60, running=false, timer=null;
  $("best").textContent=best;
  const R=$("r"),Gs=$("g"),B=$("b");

  function rand255(){ return Math.floor(Math.random()*256); }
  function newTarget(){
    // avoid near-greys sometimes for variety, but keep it fair
    target={r:rand255(),g:rand255(),b:rand255()};
    $("target").style.background=`rgb(${target.r},${target.g},${target.b})`;
    // reset sliders to mid so each round is a fresh mix
    R.value=128;Gs.value=128;B.value=128;
    paintMix();
  }
  function paintMix(){
    const r=+R.value,g=+Gs.value,b=+B.value;
    $("mix").style.background=`rgb(${r},${g},${b})`;
    $("rv").textContent=r;$("gv").textContent=g;$("bv").textContent=b;
  }
  [R,Gs,B].forEach(s=>s.addEventListener("input",()=>{paintMix(); if(running) Sound.tick();}));

  // closeness: 0..100 based on RGB euclidean distance vs max distance
  function closeness(){
    const dr=target.r-(+R.value), dg=target.g-(+Gs.value), db=target.b-(+B.value);
    const dist=Math.sqrt(dr*dr+dg*dg+db*db);
    const maxD=Math.sqrt(3*255*255);
    return Math.round((1-dist/maxD)*100);
  }

  // ---------- timer ----------
  function setTime(v){ timeLeft=Math.max(0,Math.min(75,v)); $("tbar").style.width=(timeLeft/60*100)+"%"; }
  function tickClock(){
    setTime(timeLeft-1);
    if(timeLeft<=0){ endGame(); }
  }

  // ---------- round resolution ----------
  $("lock").addEventListener("click",()=>{
    if(!running) return;
    const q=closeness();
    const pts=Math.round(q*q/40);      // reward precision: quadratic-ish
    score+=pts; $("score").textContent=score;
    const mixEl=$("mix");
    if(!reduceMotion){ mixEl.classList.remove("pop"); void mixEl.offsetWidth; mixEl.classList.add("pop"); }
    if(q>=90){
      streak++; const bonus=q>=97?5:3; setTime(timeLeft+bonus);
      $("fb").innerHTML=`<span style="color:var(--good)">${q}% — +${pts} pts, +${bonus}s! 🔥${streak>1?" ×"+streak:""}</span>`;
      Sound.good(q); haptic([10,30,10]);
    } else if(q>=70){
      streak=0;
      $("fb").innerHTML=`<span style="color:var(--accent)">${q}% — +${pts} pts. Close!</span>`;
      Sound.meh(); haptic(8);
    } else {
      streak=0;
      $("fb").innerHTML=`<span style="color:var(--bad)">${q}% — +${pts} pts. Keep mixing.</span>`;
      Sound.meh(); haptic(12);
    }
    $("streak").textContent=streak;
    if(score>best){ best=score; store.set("prism.best",best); $("best").textContent=best; }
    setTimeout(newTarget, reduceMotion?0:260);
  });

  // keyboard: Enter locks in
  window.addEventListener("keydown",e=>{
    if(e.key==="Enter"){ if(running) $("lock").click(); else if(!$("overlay").classList.contains("hidden")) $("play").click(); }
  });

  // ---------- flow ----------
  function start(){
    Sound.resume();
    score=0;streak=0; $("score").textContent=0; $("streak").textContent=0;
    setTime(60); running=true; $("overlay").classList.add("hidden");
    $("fb").textContent="Match the target. Closer = more points.";
    newTarget();
    clearInterval(timer); timer=setInterval(tickClock,1000);
  }
  function endGame(){
    running=false; clearInterval(timer); Sound.end(); haptic([20,40,20,40]);
    $("ttl").textContent = score>=best ? "NEW BEST! ✦" : "TIME!";
    $("body").innerHTML = `You scored <b>${score}</b>.<br>Best <b>${best}</b>. Streak counts reward near-perfect matches — chase the time bonus.`;
    $("play").textContent="Play again";
    $("overlay").classList.remove("hidden");
  }
  $("play").addEventListener("click",start);

  paintMix();
  window.__PRISM__={ closeness, newTarget, start, get score(){return score}, set target(t){target=t;} , get target(){return target} };
})();
</script>
</body>
</html>
