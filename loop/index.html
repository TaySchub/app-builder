<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<meta name="theme-color" content="#0b1410" />
<title>Loop — one line, every cell</title>
<style>
  :root{
    --bg:#0b1410; --panel:#11201a; --ink:#eafff4; --muted:#8fb6a4; --line:#1d3a2e;
    --path:#3ce0a0; --cell:#16271f; --node:#ffd36e; --accent:#3ce0a0;
    --tap:44px; --font:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
  }
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
  html,body{margin:0;height:100%}
  body{background:radial-gradient(120% 90% at 50% -10%, #102b20, var(--bg) 60%);
    color:var(--ink); font-family:var(--font); display:flex; flex-direction:column;
    min-height:100dvh; overflow:hidden; user-select:none;-webkit-user-select:none; touch-action:none}
  header{display:flex; align-items:center; gap:10px; padding:12px 14px}
  header h1{font-size:16px; margin:0; letter-spacing:2px; font-weight:800}
  header .sub{color:var(--muted); font-size:11px}
  .spacer{flex:1}
  button.icon{width:var(--tap);height:var(--tap);min-width:var(--tap);border-radius:12px;
    border:1px solid var(--line); background:var(--panel); color:var(--ink); font-size:17px; cursor:pointer;
    display:grid;place-items:center}
  button.icon:focus-visible,.btn:focus-visible{outline:3px solid var(--accent);outline-offset:2px}
  .hud{display:flex; gap:16px; padding:0 16px 4px; color:var(--muted); font-size:13px; align-items:center}
  .hud b{color:var(--ink); font-variant-numeric:tabular-nums}
  .stage{flex:1; position:relative; display:grid; place-items:center; padding:8px}
  canvas{touch-action:none; max-width:100%; max-height:100%}
  .toast{position:absolute; top:6px; left:50%; transform:translateX(-50%); color:var(--muted);
    font-size:12.5px; background:#11201acc; padding:6px 12px; border-radius:99px; pointer-events:none; transition:opacity .3s}
  .tools{display:flex; gap:10px; padding:10px 16px calc(12px + env(safe-area-inset-bottom))}
  .tools .btn{flex:1}
  .btn{appearance:none;border:1px solid var(--line);cursor:pointer;font-family:inherit;font-weight:700;
    background:var(--panel); color:var(--ink); padding:13px; border-radius:13px; font-size:15px; min-height:var(--tap)}
  .btn.primary{background:linear-gradient(180deg,var(--accent),#22b985); color:#04231a; border:0; font-weight:800}
  .btn:active{transform:translateY(1px)}
  .overlay{position:fixed; inset:0; display:grid; place-items:center; background:#0b1410cc; z-index:5}
  .overlay.hidden{display:none}
  .card{background:linear-gradient(180deg,#16291f,#0e1c16); border:1px solid var(--line); border-radius:20px;
    padding:26px; text-align:center; width:min(360px,86vw)}
  .card h2{margin:0 0 6px; font-size:26px}
  .card p{margin:6px 0 18px; color:var(--muted); font-size:14px; line-height:1.55}
  @media (prefers-reduced-motion: reduce){ *{transition:none!important} }
</style>
</head>
<body>
<header>
  <h1>LOOP</h1><span class="sub">one line · every cell</span>
  <div class="spacer"></div>
  <button class="icon" id="mute" aria-label="Toggle sound">🔊</button>
</header>
<div class="hud">
  <div>Level <b id="lvl">1</b></div>
  <div>Filled <b id="fill">0</b>/<b id="total">0</b></div>
  <div>Best <b id="best">1</b></div>
</div>
<div class="stage" id="stage">
  <canvas id="cv" aria-label="Loop puzzle grid"></canvas>
  <div class="toast" id="toast">Drag from ① through every cell, hitting the numbers in order.</div>
</div>
<div class="tools">
  <button class="btn" id="undo">Undo</button>
  <button class="btn" id="clear">Clear</button>
  <button class="btn primary" id="newp">New puzzle</button>
</div>

<div class="overlay" id="overlay" role="dialog" aria-modal="true">
  <div class="card">
    <h2 id="ttl">LOOP</h2>
    <p id="body">Draw <b>one continuous line</b> that fills <b>every</b> cell. Start at <b>①</b> and pass the numbered dots <b>in order</b>. Drag back to undo. Every puzzle is guaranteed solvable.</p>
    <button class="btn primary" id="play" style="width:100%">Start</button>
  </div>
</div>

<script>
/* =====================================================================
   LOOP — a "Zip"-style single-path puzzle.
   Fill every grid cell with one continuous line, passing numbered
   checkpoints in order. Puzzles are generated by first creating a random
   Hamiltonian path (snake + "backbite" shuffles) and placing checkpoints
   along it, so a solution is ALWAYS guaranteed. Offline, single file.
   ===================================================================== */
(function(){
  "use strict";
  const $=id=>document.getElementById(id);
  const store={get(k,d){try{const v=localStorage.getItem(k);return v==null?d:JSON.parse(v);}catch(e){return d;}},
               set(k,v){try{localStorage.setItem(k,JSON.stringify(v));}catch(e){}}};
  const reduceMotion=matchMedia("(prefers-reduced-motion: reduce)").matches;

  // ---------- audio ----------
  const Sound=(()=>{
    let ctx=null,muted=store.get("loop.muted",false);
    const ac=()=>{if(!ctx){try{ctx=new(window.AudioContext||window.webkitAudioContext)();}catch(e){}}return ctx;};
    function tone(f,dur=0.08,type="sine",vol=0.13){
      if(muted)return;const c=ac();if(!c)return;const o=c.createOscillator(),g=c.createGain();
      o.type=type;o.frequency.value=f;o.connect(g);g.connect(c.destination);const t=c.currentTime;
      g.gain.setValueAtTime(0.0001,t);g.gain.exponentialRampToValueAtTime(vol,t+0.008);
      g.gain.exponentialRampToValueAtTime(0.0001,t+dur);o.start(t);o.stop(t+dur+0.02);
    }
    let step=0;
    return{
      move(){ step=(step+1)%8; tone(440+step*40,0.05,"triangle",0.07); },
      check(){ tone(720,0.12,"sine",0.14); },
      back(){ tone(260,0.05,"triangle",0.08); },
      bad(){ tone(150,0.12,"sawtooth",0.10); },
      win(){ [523,659,784,1047,1319].forEach((f,i)=>setTimeout(()=>tone(f,0.2,"sine",0.15),i*90)); },
      reset(){ step=0; },
      toggle(){muted=!muted;store.set("loop.muted",muted);return muted;},get muted(){return muted;},
      resume(){const c=ac();if(c&&c.state==="suspended")c.resume();}
    };
  })();
  const haptic=ms=>{try{if(navigator.vibrate)navigator.vibrate(ms);}catch(e){}};
  const muteBtn=$("mute");
  const paintMute=()=>muteBtn.textContent=Sound.muted?"🔇":"🔊"; paintMute();
  muteBtn.addEventListener("click",()=>{Sound.toggle();paintMute();haptic(8);});

  // ---------- canvas ----------
  const cv=$("cv"),ctx=cv.getContext("2d");
  let cell=64, pad=10, cols=4, rows=4, DPR=1, originX=0, originY=0;

  // ---------- puzzle state ----------
  let level=store.get("loop.level",1);
  let best=store.get("loop.best",1);
  let checkpointOf=[];   // cellIndex -> number (0 = none)
  let path=[];           // array of cell indices in drawn order
  let lastCp=0;          // highest checkpoint number reached
  let solved=false;
  $("best").textContent=best;

  const xy=i=>({c:i%cols, r:(i/cols|0)});
  const idx=(c,r)=>r*cols+c;
  function neighbors(i){
    const {c,r}=xy(i), out=[];
    if(c>0)out.push(i-1); if(c<cols-1)out.push(i+1);
    if(r>0)out.push(i-cols); if(r<rows-1)out.push(i+cols);
    return out;
  }
  const areAdjacent=(a,b)=>{ const A=xy(a),B=xy(b); return Math.abs(A.c-B.c)+Math.abs(A.r-B.r)===1; };

  // ---- Hamiltonian generator (snake + backbite) ----
  function genHamiltonian(){
    const n=cols*rows;
    let p=[];
    for(let r=0;r<rows;r++){
      if(r%2===0){ for(let c=0;c<cols;c++) p.push(idx(c,r)); }
      else       { for(let c=cols-1;c>=0;c--) p.push(idx(c,r)); }
    }
    const pos=new Array(n);
    const reindex=()=>{ for(let i=0;i<n;i++) pos[p[i]]=i; };
    reindex();
    const iters=n*25;
    for(let it=0; it<iters; it++){
      if(Math.random()<0.5){ p.reverse(); reindex(); }
      const a=p[0], nbs=neighbors(a);
      const u=nbs[(Math.random()*nbs.length)|0];
      const k=pos[u];
      if(k>=2){ // reverse first k elements -> valid backbite
        let i=0,j=k-1; while(i<j){ const t=p[i];p[i]=p[j];p[j]=t;i++;j--; }
        reindex();
      }
    }
    return p;
  }

  function checkpointCount(){
    const cells=cols*rows;
    return Math.max(4, Math.min(8, Math.round(cells/4)));
  }

  function gridFor(L){
    // gentle ramp: 4x4 -> 5x4 -> 5x5 -> 6x5 -> 6x6 ...
    const sizes=[[4,4],[4,4],[5,4],[5,5],[6,5],[6,6],[6,6],[7,6],[7,7]];
    return sizes[Math.min(L-1, sizes.length-1)];
  }

  function build(){
    const [c,r]=gridFor(level); cols=c; rows=r;
    const sol=genHamiltonian();
    const n=cols*rows;
    checkpointOf=new Array(n).fill(0);
    const kc=Math.min(checkpointCount(), n);
    for(let i=0;i<kc;i++){
      const at = Math.round(i*(n-1)/(kc-1));
      checkpointOf[sol[at]] = i+1;
    }
    path=[]; lastCp=0; solved=false; Sound.reset();
    $("lvl").textContent=level; $("total").textContent=n; $("fill").textContent=0;
    layout(); draw();
  }

  function layout(){
    const r=$("stage").getBoundingClientRect();
    DPR=Math.min(window.devicePixelRatio||1,2);
    const availW=r.width-16, availH=r.height-16;
    cell=Math.floor(Math.min(availW/cols, availH/rows, 84));
    cell=Math.max(cell, 40); // keep tap targets comfortable
    const w=cell*cols, h=cell*rows;
    cv.style.width=w+"px"; cv.style.height=h+"px";
    cv.width=Math.round(w*DPR); cv.height=Math.round(h*DPR);
    ctx.setTransform(DPR,0,0,DPR,0,0);
    originX=0; originY=0;
  }
  window.addEventListener("resize",()=>{ layout(); draw(); });

  const cx=i=>{ const{c}=xy(i); return c*cell+cell/2; };
  const cy=i=>{ const{r}=xy(i); return r*cell+cell/2; };

  function draw(){
    const w=cell*cols, h=cell*rows;
    ctx.clearRect(0,0,w,h);
    // cells
    for(let i=0;i<cols*rows;i++){
      const {c,r}=xy(i), x=c*cell, y=r*cell;
      roundRect(x+3,y+3,cell-6,cell-6,10);
      ctx.fillStyle = path.includes(i) ? "#16322488" : getComputedStyle(document.documentElement).getPropertyValue("--cell");
      ctx.fill();
    }
    // path line
    if(path.length){
      ctx.lineWidth=Math.max(10,cell*0.34); ctx.lineJoin="round"; ctx.lineCap="round";
      ctx.strokeStyle=getComputedStyle(document.documentElement).getPropertyValue("--path");
      ctx.beginPath(); ctx.moveTo(cx(path[0]),cy(path[0]));
      for(let k=1;k<path.length;k++) ctx.lineTo(cx(path[k]),cy(path[k]));
      ctx.stroke();
      // head dot
      const head=path[path.length-1];
      ctx.fillStyle="#eafff4"; ctx.beginPath(); ctx.arc(cx(head),cy(head),Math.max(7,cell*0.13),0,7); ctx.fill();
    }
    // checkpoints
    for(let i=0;i<cols*rows;i++){
      const n=checkpointOf[i]; if(!n) continue;
      const x=cx(i), y=cy(i), R=Math.max(13,cell*0.27);
      ctx.beginPath(); ctx.arc(x,y,R,0,7);
      const reached = path.includes(i);
      ctx.fillStyle = reached ? "#1c3a2c" : "#0e1c16";
      ctx.fill();
      ctx.lineWidth=3; ctx.strokeStyle=getComputedStyle(document.documentElement).getPropertyValue("--node"); ctx.stroke();
      ctx.fillStyle=getComputedStyle(document.documentElement).getPropertyValue("--node");
      ctx.font=`700 ${Math.max(13,cell*0.32)}px ${getComputedStyle(document.body).fontFamily}`;
      ctx.textAlign="center"; ctx.textBaseline="middle";
      ctx.fillText(String(n), x, y+1);
    }
  }
  function roundRect(x,y,w,h,r){ ctx.beginPath();
    ctx.moveTo(x+r,y); ctx.arcTo(x+w,y,x+w,y+h,r); ctx.arcTo(x+w,y+h,x,y+h,r);
    ctx.arcTo(x,y+h,x,y,r); ctx.arcTo(x,y,x+w,y,r); ctx.closePath(); }

  // ---------- input ----------
  function cellAt(clientX,clientY){
    const r=cv.getBoundingClientRect();
    const x=clientX-r.left, y=clientY-r.top;
    if(x<0||y<0||x>cell*cols||y>cell*rows) return -1;
    const c=Math.floor(x/cell), rr=Math.floor(y/cell);
    return idx(Math.min(cols-1,Math.max(0,c)), Math.min(rows-1,Math.max(0,rr)));
  }
  let drawing=false;

  function tryStart(i){
    if(checkpointOf[i]===1){ path=[i]; lastCp=1; drawing=true; Sound.check(); haptic(8); update(); }
    else { Sound.bad(); haptic(15); flashToast("Start on ①"); }
  }
  function tryExtend(i){
    if(i<0) return;
    const head=path[path.length-1];
    if(i===head) return;
    // backtrack
    if(path.length>=2 && i===path[path.length-2]){
      const removed=path.pop();
      if(checkpointOf[removed]){ /* recompute lastCp */ recomputeCp(); }
      Sound.back(); haptic(5); update(); return;
    }
    if(!areAdjacent(head,i)) return;
    if(path.includes(i)) return;             // no revisits
    const cp=checkpointOf[i];
    if(cp && cp!==lastCp+1){ Sound.bad(); haptic(15); flashToast("Reach "+(lastCp+1)+" first"); return; }
    path.push(i);
    if(cp){ lastCp=cp; Sound.check(); haptic(10); } else { Sound.move(); haptic(3); }
    update();
  }
  function recomputeCp(){ lastCp=0; for(const c of path){ if(checkpointOf[c]) lastCp=Math.max(lastCp,checkpointOf[c]); } }

  function update(){
    $("fill").textContent=path.length;
    draw();
    if(!solved && path.length===cols*rows){ win(); }
  }

  function down(e){
    Sound.resume();
    const p=e.touches?e.touches[0]:e;
    const i=cellAt(p.clientX,p.clientY); if(i<0) return;
    $("toast").style.opacity=0;
    if(path.length===0){ tryStart(i); }
    else if(i===path[path.length-1] || i===path[path.length-2]){ drawing=true; tryExtend(i); }
    else if(checkpointOf[i]===1){ path=[i]; lastCp=1; drawing=true; update(); } // restart from 1
    else { drawing=true; tryExtend(i); }
    e.preventDefault();
  }
  function move(e){
    if(!drawing) return;
    const p=e.touches?e.touches[0]:e;
    tryExtend(cellAt(p.clientX,p.clientY));
    e.preventDefault();
  }
  function up(){ drawing=false; }
  cv.addEventListener("mousedown",down); cv.addEventListener("touchstart",down,{passive:false});
  window.addEventListener("mousemove",move); window.addEventListener("touchmove",move,{passive:false});
  window.addEventListener("mouseup",up); window.addEventListener("touchend",up);

  // keyboard: arrows extend from head
  window.addEventListener("keydown",e=>{
    const map={ArrowLeft:-1,ArrowRight:1,ArrowUp:-cols,ArrowDown:cols};
    if(e.key in map){
      e.preventDefault();
      if(path.length===0){ /* find checkpoint 1 */ const s=checkpointOf.indexOf(1); if(s>=0) tryStart(s); return; }
      const head=path[path.length-1], {c,r}=xy(head);
      if(e.key==="ArrowLeft"&&c===0)return; if(e.key==="ArrowRight"&&c===cols-1)return;
      if(e.key==="ArrowUp"&&r===0)return; if(e.key==="ArrowDown"&&r===rows-1)return;
      tryExtend(head+map[e.key]);
    } else if(e.key==="Backspace"){ e.preventDefault(); $("undo").click(); }
  });

  let toastT=null;
  function flashToast(msg){ const t=$("toast"); t.textContent=msg; t.style.opacity=1;
    clearTimeout(toastT); toastT=setTimeout(()=>t.style.opacity=0,1100); }

  // ---------- win ----------
  function win(){
    solved=true; drawing=false; Sound.win(); haptic([20,40,20,60]);
    if(level+1>best){ best=level+1; store.set("loop.best",best); $("best").textContent=best; }
    setTimeout(()=>{
      $("ttl").textContent="Filled! ✦";
      $("body").innerHTML=`One line, every cell, numbers in order. <br>On to level <b>${level+1}</b>.`;
      $("play").textContent="Next level →";
      $("overlay").classList.remove("hidden");
    }, reduceMotion?0:500);
  }

  // ---------- tools ----------
  $("undo").addEventListener("click",()=>{ if(path.length){ path.pop(); recomputeCp(); Sound.back(); update(); }});
  $("clear").addEventListener("click",()=>{ path=[]; lastCp=0; Sound.back(); update(); });
  $("newp").addEventListener("click",()=>{ build(); });
  $("play").addEventListener("click",()=>{
    const wasWin=solved;
    $("overlay").classList.add("hidden");
    if(wasWin){ level++; store.set("loop.level",level); }
    build();
  });

  // boot
  build();
  setTimeout(()=>{ layout(); draw(); },60);

  window.__LOOP__={ build, genHamiltonian, neighbors, get path(){return path}, get cols(){return cols}, get rows(){return rows},
                    get checkpointOf(){return checkpointOf}, areAdjacent };
})();
</script>
</body>
</html>
