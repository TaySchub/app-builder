<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<meta name="theme-color" content="#0c0a1f" />
<title>Reflex Ring</title>
<style>
  /* ---------- Design tokens ---------- */
  :root{
    --bg:#0c0a1f;
    --bg2:#16123a;
    --ink:#f4f1ff;
    --muted:#9b94c9;
    --accent:#36e0c2;     /* target / success */
    --accent2:#ff5d8f;    /* pointer / danger */
    --ring:#2a2456;
    --good:#36e0c2;
    --font: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, system-ui, sans-serif;
  }
  *{box-sizing:border-box; -webkit-tap-highlight-color:transparent;}
  html,body{height:100%;margin:0;}
  body{
    font-family:var(--font);
    color:var(--ink);
    background:radial-gradient(120% 120% at 50% 0%, var(--bg2), var(--bg) 70%);
    display:flex;flex-direction:column;align-items:center;
    min-height:100dvh;overflow:hidden;
    user-select:none;-webkit-user-select:none;
    touch-action:manipulation;
  }
  header{
    width:100%;max-width:480px;padding:14px 18px 4px;
    display:flex;align-items:center;justify-content:space-between;gap:10px;
  }
  .title{font-weight:800;letter-spacing:.5px;font-size:18px;}
  .title span{color:var(--accent);}
  .iconbtn{
    width:44px;height:44px;border:none;border-radius:12px;
    background:rgba(255,255,255,.06);color:var(--ink);
    font-size:18px;cursor:pointer;display:grid;place-items:center;
  }
  .iconbtn:focus-visible{outline:3px solid var(--accent);outline-offset:2px;}
  .stats{
    width:100%;max-width:480px;padding:2px 18px;
    display:flex;justify-content:space-between;color:var(--muted);font-size:14px;font-weight:600;
  }
  .stats b{color:var(--ink);font-size:22px;display:block;line-height:1;}
  .stage{flex:1;width:100%;max-width:480px;display:grid;place-items:center;position:relative;}
  canvas{width:min(86vw,360px);height:min(86vw,360px);touch-action:manipulation;}
  /* Center overlay (start / game over) */
  .overlay{
    position:absolute;inset:0;display:grid;place-items:center;padding:24px;text-align:center;
  }
  .card{
    background:rgba(20,16,55,.82);backdrop-filter:blur(8px);
    border:1px solid rgba(255,255,255,.08);border-radius:22px;
    padding:26px 22px;max-width:320px;width:100%;
    box-shadow:0 18px 50px rgba(0,0,0,.45);
  }
  .card h1{margin:0 0 6px;font-size:26px;}
  .card p{margin:0 0 18px;color:var(--muted);font-size:15px;line-height:1.45;}
  .big{font-size:46px;font-weight:800;margin:2px 0;}
  .play{
    border:none;border-radius:16px;padding:15px 26px;font-size:18px;font-weight:800;
    background:linear-gradient(135deg,var(--accent),#6ce0ff);color:#04231f;cursor:pointer;
    width:100%;min-height:52px;
  }
  .play:focus-visible{outline:3px solid #fff;outline-offset:3px;}
  .hint{margin-top:14px;color:var(--muted);font-size:13px;}
  .hidden{display:none !important;}
  .flash{position:absolute;inset:0;pointer-events:none;background:var(--accent);opacity:0;border-radius:0;}
  footer{padding:8px 0 14px;color:var(--muted);font-size:12px;text-align:center;}
  @media (prefers-reduced-motion: reduce){
    .flash{display:none;}
  }
</style>
</head>
<body>
  <header>
    <div class="title">Reflex<span>Ring</span></div>
    <button class="iconbtn" id="muteBtn" aria-label="Toggle sound" aria-pressed="false">🔊</button>
  </header>

  <div class="stats" aria-live="polite">
    <div>SCORE<b id="score">0</b></div>
    <div style="text-align:right">BEST<b id="best">0</b></div>
  </div>

  <main class="stage">
    <canvas id="game" width="360" height="360" aria-label="Reflex ring play area"></canvas>
    <div class="flash" id="flash" aria-hidden="true"></div>

    <div class="overlay" id="overlay">
      <div class="card">
        <h1 id="ovTitle">Reflex Ring</h1>
        <p id="ovText">Tap the moment the glowing dot crosses the mint target. Each hit makes the target smaller and the dot faster. One miss ends the run.</p>
        <div class="big hidden" id="ovScore">0</div>
        <button class="play" id="playBtn">Tap to start</button>
        <div class="hint">Tap anywhere, or press Space</div>
      </div>
    </div>
  </main>

  <footer>No accounts • plays offline • scores stay on your device</footer>

<script>
/* =====================================================================
   Reflex Ring — a one-tap timing game.
   Core loop: a dot sweeps around a ring; tap while it overlaps the target
   arc. Hits shrink the target + speed up; a miss ends the run.
   All self-contained: Web Audio for sound, no external assets.
   ===================================================================== */
(() => {
  "use strict";

  // ---------- Tiny helpers ----------
  const $ = (id) => document.getElementById(id);
  const TAU = Math.PI * 2;
  const clamp = (v, a, b) => Math.max(a, Math.min(b, v));
  const reduceMotion = window.matchMedia &&
    window.matchMedia("(prefers-reduced-motion: reduce)").matches;

  // ---------- Persistent, on-device state only ----------
  const store = {
    get best(){ return +(safeGet("rr_best") || 0); },
    set best(v){ safeSet("rr_best", v); },
    get muted(){ return safeGet("rr_muted") === "1"; },
    set muted(v){ safeSet("rr_muted", v ? "1" : "0"); },
  };
  function safeGet(k){ try { return localStorage.getItem(k); } catch(e){ return null; } }
  function safeSet(k,v){ try { localStorage.setItem(k, v); } catch(e){} }

  // ---------- Audio (generated, no files) ----------
  const Sound = {
    ctx:null, muted:store.muted,
    ensure(){ if(!this.ctx){ try{ this.ctx = new (window.AudioContext||window.webkitAudioContext)(); }catch(e){} } },
    blip(freq=600, dur=0.09, type="sine", gain=0.18){
      if(this.muted) return; this.ensure(); if(!this.ctx) return;
      const t = this.ctx.currentTime;
      const o = this.ctx.createOscillator(), g = this.ctx.createGain();
      o.type = type; o.frequency.setValueAtTime(freq, t);
      g.gain.setValueAtTime(0.0001, t);
      g.gain.exponentialRampToValueAtTime(gain, t+0.008);
      g.gain.exponentialRampToValueAtTime(0.0001, t+dur);
      o.connect(g).connect(this.ctx.destination);
      o.start(t); o.stop(t+dur+0.02);
    },
    hit(combo){ this.blip(440 + Math.min(combo,24)*28, 0.10, "triangle", 0.2); },
    fail(){ this.blip(180, 0.30, "sawtooth", 0.22); setTimeout(()=>this.blip(120,0.32,"sawtooth",0.18),60); },
    start(){ this.blip(520,0.08,"sine",0.16); }
  };

  function haptic(ms){ try{ if(navigator.vibrate) navigator.vibrate(ms); }catch(e){} }

  // ---------- Canvas setup (retina-aware) ----------
  const canvas = $("game"), ctx = canvas.getContext("2d");
  let CSS = 360; // logical size in px
  function fitCanvas(){
    const dpr = Math.min(window.devicePixelRatio || 1, 3);
    const rect = canvas.getBoundingClientRect();
    CSS = rect.width || 360;
    canvas.width = Math.round(CSS * dpr);
    canvas.height = Math.round(CSS * dpr);
    ctx.setTransform(dpr,0,0,dpr,0,0);
  }
  window.addEventListener("resize", fitCanvas);

  // ---------- Game state ----------
  const G = {
    running:false,
    angle:0,            // pointer angle (radians)
    speed:2.0,          // radians/sec
    dir:1,
    targetCenter:0,     // radians
    targetHalf:0.55,    // half-width of target arc (radians)
    score:0,
    combo:0,
    last:0,
    particles:[],
    shakeT:0,
  };

  function newTarget(){
    // Place target somewhere ahead of the pointer so it's reachable.
    G.targetCenter = Math.random() * TAU;
    // shrink target as score rises, with a floor
    G.targetHalf = clamp(0.55 - G.score*0.012, 0.16, 0.55);
  }

  function startGame(){
    Sound.ensure();
    G.running = true; G.angle = -Math.PI/2; G.speed = 2.0; G.dir = 1;
    G.score = 0; G.combo = 0; G.particles.length = 0; G.shakeT = 0;
    newTarget();
    $("score").textContent = "0";
    $("overlay").classList.add("hidden");
    Sound.start(); haptic(8);
    G.last = performance.now();
    requestAnimationFrame(loop);
  }

  function endGame(){
    G.running = false;
    Sound.fail(); haptic([20,40,30]);
    if(G.score > store.best){ store.best = G.score; $("best").textContent = G.score; }
    $("ovTitle").textContent = G.score > 0 ? "Run over" : "Reflex Ring";
    $("ovText").textContent = bestMsg();
    $("ovScore").textContent = G.score;
    $("ovScore").classList.remove("hidden");
    $("playBtn").textContent = "Play again";
    $("overlay").classList.remove("hidden");
  }
  function bestMsg(){
    if(G.score === 0) return "So close — tap right as the dot crosses the mint zone.";
    if(G.score >= store.best && G.score>0) return "New best! The zone shrinks every hit — how far can you go?";
    return "Nice. Your best is " + store.best + ". Tap to chase it.";
  }

  // ---------- Input: a single "tap" action ----------
  function tap(){
    if(!G.running){ startGame(); return; }
    // Is the pointer currently within the target arc?
    let diff = Math.atan2(Math.sin(G.angle - G.targetCenter), Math.cos(G.angle - G.targetCenter));
    if(Math.abs(diff) <= G.targetHalf){
      // HIT
      G.score++; G.combo++;
      $("score").textContent = G.score;
      Sound.hit(G.combo); haptic(12);
      spawnBurst();
      flash();
      // ramp difficulty: faster + occasionally flip direction
      G.speed = clamp(2.0 + G.score*0.16, 2.0, 7.5);
      if(G.score % 4 === 0) G.dir *= -1;
      newTarget();
    } else {
      // MISS
      G.combo = 0;
      G.shakeT = reduceMotion ? 0 : 0.28;
      endGame();
    }
  }

  // ---------- Juice: particles + flash ----------
  function spawnBurst(){
    if(reduceMotion) return;
    const cx = CSS/2, cy = CSS/2, R = CSS*0.40;
    const x = cx + Math.cos(G.targetCenter)*R, y = cy + Math.sin(G.targetCenter)*R;
    for(let i=0;i<14;i++){
      const a = Math.random()*TAU, sp = 40 + Math.random()*120;
      G.particles.push({x,y,vx:Math.cos(a)*sp,vy:Math.sin(a)*sp,life:1});
    }
  }
  function flash(){
    if(reduceMotion) return;
    const f = $("flash");
    f.style.transition="none"; f.style.opacity="0.22";
    requestAnimationFrame(()=>{ f.style.transition="opacity .35s ease"; f.style.opacity="0"; });
  }

  // ---------- Render ----------
  function draw(dt){
    const w = CSS, h = CSS, cx=w/2, cy=h/2;
    const R = w*0.40, lw = Math.max(14, w*0.055);
    ctx.clearRect(0,0,w,h);

    // optional shake
    let sx=0, sy=0;
    if(G.shakeT>0 && !reduceMotion){
      G.shakeT = Math.max(0, G.shakeT - dt);
      const m = G.shakeT*22;
      sx = (Math.random()*2-1)*m; sy = (Math.random()*2-1)*m;
    }
    ctx.save(); ctx.translate(sx,sy);

    // base ring
    ctx.lineCap="round";
    ctx.lineWidth = lw;
    ctx.strokeStyle = "#2a2456";
    ctx.beginPath(); ctx.arc(cx,cy,R,0,TAU); ctx.stroke();

    // target arc (mint, glowing)
    ctx.strokeStyle = "#36e0c2";
    ctx.shadowColor = "#36e0c2"; ctx.shadowBlur = reduceMotion?0:18;
    ctx.beginPath();
    ctx.arc(cx,cy,R, G.targetCenter-G.targetHalf, G.targetCenter+G.targetHalf);
    ctx.stroke();
    ctx.shadowBlur = 0;

    // pointer dot
    const px = cx + Math.cos(G.angle)*R, py = cy + Math.sin(G.angle)*R;
    ctx.fillStyle = "#ff5d8f";
    ctx.shadowColor="#ff5d8f"; ctx.shadowBlur = reduceMotion?0:16;
    ctx.beginPath(); ctx.arc(px,py, lw*0.62, 0, TAU); ctx.fill();
    ctx.shadowBlur=0;

    // center score
    ctx.fillStyle = "rgba(244,241,255,.92)";
    ctx.font = "800 " + Math.round(w*0.18) + "px " + getFont();
    ctx.textAlign="center"; ctx.textBaseline="middle";
    ctx.fillText(G.running ? G.score : "", cx, cy);

    // particles
    for(const p of G.particles){
      ctx.globalAlpha = clamp(p.life,0,1);
      ctx.fillStyle = "#6ce0ff";
      ctx.beginPath(); ctx.arc(p.x,p.y, 3.2, 0, TAU); ctx.fill();
    }
    ctx.globalAlpha = 1;
    ctx.restore();
  }
  function getFont(){
    return '-apple-system, "Segoe UI", Roboto, system-ui, sans-serif';
  }

  // ---------- Main loop ----------
  function loop(now){
    const dt = Math.min(0.05, (now - G.last)/1000);
    G.last = now;
    if(G.running){
      G.angle += G.speed * G.dir * dt;
      if(G.angle > TAU) G.angle -= TAU;
      if(G.angle < 0) G.angle += TAU;
    }
    // advance particles regardless so they fade out
    for(const p of G.particles){
      p.x += p.vx*dt; p.y += p.vy*dt; p.vx*=0.92; p.vy*=0.92; p.life -= dt*1.8;
    }
    G.particles = G.particles.filter(p=>p.life>0);

    draw(dt);
    if(G.running || G.particles.length>0 || G.shakeT>0) requestAnimationFrame(loop);
  }

  // ---------- Wire up input ----------
  function onPointer(e){
    // ignore taps that originate on the mute button
    if(e.target && e.target.closest && e.target.closest("#muteBtn")) return;
    e.preventDefault();
    tap();
  }
  canvas.addEventListener("pointerdown", onPointer);
  $("overlay").addEventListener("pointerdown", onPointer);
  window.addEventListener("keydown", (e)=>{
    if(e.code === "Space" || e.code === "Enter"){ e.preventDefault(); tap(); }
  });

  // mute toggle
  function renderMute(){
    $("muteBtn").textContent = Sound.muted ? "🔇" : "🔊";
    $("muteBtn").setAttribute("aria-pressed", String(Sound.muted));
  }
  $("muteBtn").addEventListener("click", (e)=>{
    e.stopPropagation();
    Sound.muted = !Sound.muted; store.muted = Sound.muted; renderMute();
    if(!Sound.muted) Sound.blip(660,0.08,"sine",0.16);
  });

  // ---------- Boot ----------
  function boot(){
    fitCanvas();
    $("best").textContent = store.best;
    renderMute();
    draw(0);
  }
  boot();

  // expose a tiny hook for self-tests (no effect in browser play)
  window.__RR__ = { G, tap, startGame, boot };
})();
</script>
</body>
</html>
