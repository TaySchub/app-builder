<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<meta name="theme-color" content="#0e1026" />
<title>Tangle — untangle the web</title>
<style>
  /* ---------- Design tokens ---------- */
  :root{
    --bg:#0e1026; --bg2:#161a3a;
    --ink:#eef1ff; --muted:#9aa3d4;
    --node:#ffd36e; --node-grab:#fff;
    --edge:#3b4596; --edge-cross:#ff5d73; --edge-clean:#56e0a0;
    --accent:#7c8cff;
    --tap:44px;
    --font: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
  }
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
  html,body{margin:0;height:100%}
  body{
    background:radial-gradient(120% 90% at 50% -10%, var(--bg2), var(--bg) 60%);
    color:var(--ink); font-family:var(--font);
    display:flex; flex-direction:column; min-height:100dvh; overflow:hidden;
    user-select:none; -webkit-user-select:none; touch-action:none;
  }
  header{
    display:flex; align-items:center; gap:10px; padding:12px 14px;
  }
  header h1{font-size:17px; margin:0; letter-spacing:.5px; font-weight:700}
  header .sub{color:var(--muted); font-size:12px; margin-left:2px}
  .spacer{flex:1}
  button.icon{
    width:var(--tap); height:var(--tap); min-width:var(--tap);
    border-radius:12px; border:1px solid #2a306a; background:#191e44; color:var(--ink);
    font-size:18px; cursor:pointer; display:grid; place-items:center;
  }
  button.icon:focus-visible, .btn:focus-visible{outline:3px solid var(--accent); outline-offset:2px}
  .hud{display:flex; gap:18px; padding:0 16px 8px; color:var(--muted); font-size:13px}
  .hud b{color:var(--ink); font-variant-numeric:tabular-nums}
  .stage{flex:1; position:relative}
  canvas{position:absolute; inset:0; width:100%; height:100%; display:block}
  .toast{
    position:absolute; left:50%; top:14px; transform:translateX(-50%);
    background:#191e44cc; border:1px solid #2a306a; padding:8px 14px; border-radius:999px;
    font-size:13px; color:var(--muted); backdrop-filter:blur(6px); pointer-events:none;
    transition:opacity .3s; max-width:90%; text-align:center;
  }
  /* Win overlay */
  .overlay{
    position:absolute; inset:0; display:none; place-items:center; z-index:5;
    background:#0e1026aa; backdrop-filter:blur(3px);
  }
  .overlay.show{display:grid}
  .card{
    background:linear-gradient(180deg,#1b2150,#141838);
    border:1px solid #2c3470; border-radius:20px; padding:26px 28px; text-align:center;
    width:min(360px,86vw); box-shadow:0 20px 60px #0008;
  }
  .card h2{margin:0 0 6px; font-size:26px}
  .card p{margin:4px 0 18px; color:var(--muted); font-size:14px}
  .btn{
    appearance:none; border:0; cursor:pointer; font-family:inherit; font-weight:700;
    background:linear-gradient(180deg,var(--accent),#5b6cf0); color:#fff;
    padding:14px 22px; border-radius:14px; font-size:16px; min-height:var(--tap); width:100%;
  }
  .btn:active{transform:translateY(1px)}
  @media (prefers-reduced-motion: reduce){ *{transition:none !important} }
</style>
</head>
<body>
<header>
  <h1>TANGLE <span class="sub">untangle the web</span></h1>
  <div class="spacer"></div>
  <button class="icon" id="mute" aria-label="Toggle sound">🔊</button>
</header>
<div class="hud">
  <div>Level <b id="lvl">1</b></div>
  <div>Crossings <b id="cross">0</b></div>
  <div>Best <b id="best">1</b></div>
</div>
<div class="stage">
  <canvas id="cv" aria-label="Tangle puzzle board"></canvas>
  <div class="toast" id="toast">Drag the dots so no lines cross.</div>
  <div class="overlay" id="overlay" role="dialog" aria-modal="true">
    <div class="card">
      <h2 id="ovTitle">Solved! ✦</h2>
      <p id="ovBody">No crossings. Nice.</p>
      <button class="btn" id="next">Next level →</button>
    </div>
  </div>
</div>

<script>
/* =====================================================================
   TANGLE — a calm spatial-logic puzzle.
   Drag the nodes until none of the connecting edges cross.
   Solvability is GUARANTEED: edges are chosen as non-crossing chords of
   a convex polygon, so the circular layout is always a valid solution.
   Single file, offline, no dependencies.
   ===================================================================== */
(function(){
  "use strict";

  // ---------- tiny helpers ----------
  const $ = id => document.getElementById(id);
  const clamp = (v,a,b)=> v<a?a : v>b?b : v;
  const reduceMotion = matchMedia("(prefers-reduced-motion: reduce)").matches;

  // ---------- persistent prefs (on-device only) ----------
  const store = {
    get(k,d){ try{ const v=localStorage.getItem(k); return v==null?d:JSON.parse(v);}catch(e){return d;} },
    set(k,v){ try{ localStorage.setItem(k,JSON.stringify(v)); }catch(e){} }
  };

  // ---------- audio (generated, no files) ----------
  const Audio = (()=>{
    let ctx=null, muted = store.get("tangle.muted", false);
    function ac(){ if(!ctx){ try{ ctx=new (window.AudioContext||window.webkitAudioContext)(); }catch(e){} } return ctx; }
    function tone(freq, dur=0.12, type="sine", vol=0.18){
      if(muted) return; const c=ac(); if(!c) return;
      const o=c.createOscillator(), g=c.createGain();
      o.type=type; o.frequency.value=freq;
      o.connect(g); g.connect(c.destination);
      const t=c.currentTime;
      g.gain.setValueAtTime(0,t);
      g.gain.linearRampToValueAtTime(vol,t+0.01);
      g.gain.exponentialRampToValueAtTime(0.0001,t+dur);
      o.start(t); o.stop(t+dur+0.02);
    }
    return {
      grab(){ tone(330,0.06,"triangle",0.12); },
      drop(){ tone(220,0.06,"triangle",0.10); },
      clean(){ tone(660,0.09,"sine",0.13); },
      win(){ [523,659,784,1047].forEach((f,i)=> setTimeout(()=>tone(f,0.18,"sine",0.16), i*90)); },
      toggle(){ muted=!muted; store.set("tangle.muted",muted); return muted; },
      get muted(){ return muted; },
      resume(){ const c=ac(); if(c && c.state==="suspended") c.resume(); }
    };
  })();

  function haptic(ms){ try{ if(navigator.vibrate) navigator.vibrate(ms); }catch(e){} }

  // ---------- mute button ----------
  const muteBtn=$("mute");
  function paintMute(){ muteBtn.textContent = Audio.muted ? "🔇" : "🔊"; muteBtn.setAttribute("aria-pressed", Audio.muted); }
  paintMute();
  muteBtn.addEventListener("click", ()=>{ Audio.toggle(); paintMute(); haptic(8); });

  // ---------- canvas ----------
  const cv=$("cv"), ctx=cv.getContext("2d");
  let W=0,H=0,DPR=1;
  function resize(){
    const r=cv.getBoundingClientRect();
    DPR=Math.min(window.devicePixelRatio||1, 2);
    W=r.width; H=r.height;
    cv.width=Math.round(W*DPR); cv.height=Math.round(H*DPR);
    ctx.setTransform(DPR,0,0,DPR,0,0);
    draw();
  }
  window.addEventListener("resize", resize);

  // ---------- geometry ----------
  // segment intersection (proper crossing, ignores shared endpoints)
  function ccw(ax,ay,bx,by,cx,cy){ return (cy-ay)*(bx-ax) > (by-ay)*(cx-ax); }
  function segCross(p1,p2,p3,p4){
    // shared endpoint -> not a crossing
    if(p1===p3||p1===p4||p2===p3||p2===p4) return false;
    return ccw(p1.x,p1.y,p3.x,p3.y,p4.x,p4.y)!==ccw(p2.x,p2.y,p3.x,p3.y,p4.x,p4.y) &&
           ccw(p1.x,p1.y,p2.x,p2.y,p3.x,p3.y)!==ccw(p1.x,p1.y,p2.x,p2.y,p4.x,p4.y);
  }

  // ---------- game state ----------
  let nodes=[];     // {x,y, sx,sy(solution), r}
  let edges=[];     // {a,b} indices
  let level = store.get("tangle.level", 1);
  let best  = store.get("tangle.best", 1);
  let dragging=-1, dragDX=0, dragDY=0;
  let solved=false;

  $("best").textContent=best;

  // Build a guaranteed-solvable puzzle of n nodes.
  // Solution layout = points on a circle. Edges = polygon ring + random
  // non-crossing chords (interleaving test on the convex polygon).
  function buildLevel(n){
    solved=false;
    const cx=W/2, cy=H/2, R=Math.min(W,H)*0.34;
    nodes=[]; edges=[];
    for(let i=0;i<n;i++){
      const a = (i/n)*Math.PI*2 - Math.PI/2;
      nodes.push({ sx:cx+Math.cos(a)*R, sy:cy+Math.sin(a)*R, x:0,y:0, r:13 });
    }
    // polygon ring
    const used=new Set();
    const key=(a,b)=> a<b? a+"-"+b : b+"-"+a;
    for(let i=0;i<n;i++){ const a=i,b=(i+1)%n; edges.push({a,b}); used.add(key(a,b)); }
    // chords: endpoints i<j interleave with existing chord k<l iff i<k<j<l or k<i<l<j
    function interleaves(i,j,k,l){ return (i<k&&k<j&&j<l) || (k<i&&i<l&&l<j); }
    const chords=[];
    const targetExtra = Math.floor(n*0.7)+1;
    let tries=0;
    while(chords.length<targetExtra && tries<n*n*3){
      tries++;
      let a=Math.floor(Math.random()*n), b=Math.floor(Math.random()*n);
      if(a===b) continue;
      let i=Math.min(a,b), j=Math.max(a,b);
      if(j-i<=1 || (i===0 && j===n-1)) continue; // adjacent on ring already
      if(used.has(key(i,j))) continue;
      let ok=true;
      for(const c of chords){ if(interleaves(i,j,c.i,c.j)){ ok=false; break; } }
      if(!ok) continue;
      chords.push({i,j}); used.add(key(i,j)); edges.push({a:i,b:j});
    }
    // scramble node positions into the play area (with margin)
    const m=26;
    for(const nd of nodes){
      nd.x = m+Math.random()*(W-2*m);
      nd.y = m+Math.random()*(H-2*m);
    }
    // make sure it actually starts tangled; if not, reshuffle a few times
    let guard=0;
    while(countCrossings()===0 && guard++<8){
      for(const nd of nodes){ nd.x=m+Math.random()*(W-2*m); nd.y=m+Math.random()*(H-2*m); }
    }
    $("lvl").textContent=level;
    updateCross();
    draw();
  }

  function countCrossings(){
    let c=0;
    for(let i=0;i<edges.length;i++){
      const e1=edges[i], a=nodes[e1.a], b=nodes[e1.b];
      for(let j=i+1;j<edges.length;j++){
        const e2=edges[j];
        if(segCross(a,b,nodes[e2.a],nodes[e2.b])) c++;
      }
    }
    return c;
  }

  // mark which edges currently cross (for coloring)
  function crossingFlags(){
    const flag=new Array(edges.length).fill(false);
    for(let i=0;i<edges.length;i++){
      const a=nodes[edges[i].a], b=nodes[edges[i].b];
      for(let j=i+1;j<edges.length;j++){
        if(segCross(a,b,nodes[edges[j].a],nodes[edges[j].b])){ flag[i]=true; flag[j]=true; }
      }
    }
    return flag;
  }

  let lastCross=-1;
  function updateCross(){
    const c=countCrossings();
    $("cross").textContent=c;
    if(c!==lastCross && c>0 && lastCross>0 && c<lastCross){ Audio.clean(); } // got closer
    lastCross=c;
    if(c===0 && !solved){ win(); }
    return c;
  }

  // ---------- drawing ----------
  function draw(){
    ctx.clearRect(0,0,W,H);
    const flags=crossingFlags();
    // edges
    ctx.lineWidth=2.5; ctx.lineCap="round";
    for(let i=0;i<edges.length;i++){
      const a=nodes[edges[i].a], b=nodes[edges[i].b];
      ctx.strokeStyle = flags[i] ? cssVar("--edge-cross") : (solved? cssVar("--edge-clean") : cssVar("--edge"));
      ctx.globalAlpha = flags[i]?0.95:0.8;
      ctx.beginPath(); ctx.moveTo(a.x,a.y); ctx.lineTo(b.x,b.y); ctx.stroke();
    }
    ctx.globalAlpha=1;
    // nodes
    for(let i=0;i<nodes.length;i++){
      const nd=nodes[i];
      ctx.beginPath();
      ctx.arc(nd.x,nd.y,nd.r+ (i===dragging?4:0),0,Math.PI*2);
      ctx.fillStyle = i===dragging ? cssVar("--node-grab") : cssVar("--node");
      ctx.shadowColor = i===dragging ? "#fff8" : "#ffd36e55";
      ctx.shadowBlur = i===dragging ? 18 : 8;
      ctx.fill();
      ctx.shadowBlur=0;
    }
  }
  const _vc={};
  function cssVar(name){ if(!_vc[name]) _vc[name]=getComputedStyle(document.documentElement).getPropertyValue(name).trim(); return _vc[name]; }

  // ---------- particles for win ----------
  let parts=[];
  function burst(x,y){
    if(reduceMotion) return;
    for(let i=0;i<26;i++){
      const a=Math.random()*Math.PI*2, sp=1+Math.random()*4;
      parts.push({x,y,vx:Math.cos(a)*sp,vy:Math.sin(a)*sp,life:1,c:["#ffd36e","#7c8cff","#56e0a0"][i%3]});
    }
  }
  let rafOn=false;
  function loop(){
    if(parts.length){
      draw();
      for(const p of parts){ p.x+=p.vx; p.y+=p.vy; p.vy+=0.08; p.life-=0.02; }
      parts=parts.filter(p=>p.life>0);
      ctx.save();
      for(const p of parts){ ctx.globalAlpha=Math.max(0,p.life); ctx.fillStyle=p.c; ctx.beginPath(); ctx.arc(p.x,p.y,3,0,7); ctx.fill(); }
      ctx.restore();
      requestAnimationFrame(loop);
    } else { rafOn=false; draw(); }
  }
  function startLoop(){ if(!rafOn){ rafOn=true; requestAnimationFrame(loop); } }

  // ---------- win ----------
  function win(){
    solved=true;
    Audio.win(); haptic([20,40,20]);
    burst(W/2,H/2); startLoop();
    if(level+1>best){ best=level+1; store.set("tangle.best",best); $("best").textContent=best; }
    setTimeout(()=>{
      $("ovTitle").textContent = "Solved! ✦";
      $("ovBody").textContent  = level>=8 ? "Beautiful. The web is calm." : "No crossings left. Onward.";
      $("overlay").classList.add("show");
    }, reduceMotion?0:450);
  }

  // ---------- input ----------
  function pos(e){
    const r=cv.getBoundingClientRect();
    const t=e.touches?e.touches[0]:e;
    return { x:t.clientX-r.left, y:t.clientY-r.top };
  }
  function pick(p){
    let best=-1, bd=1e9;
    for(let i=0;i<nodes.length;i++){
      const dx=nodes[i].x-p.x, dy=nodes[i].y-p.y, d=dx*dx+dy*dy;
      if(d<bd){ bd=d; best=i; }
    }
    return (bd <= (30*30)) ? best : -1; // generous tap radius
  }
  function down(e){
    Audio.resume();
    const p=pos(e), i=pick(p);
    if(i<0) return;
    dragging=i; dragDX=nodes[i].x-p.x; dragDY=nodes[i].y-p.y;
    Audio.grab(); haptic(6);
    $("toast").style.opacity=0;
    draw(); e.preventDefault();
  }
  function move(e){
    if(dragging<0) return;
    const p=pos(e);
    nodes[dragging].x=clamp(p.x+dragDX,16,W-16);
    nodes[dragging].y=clamp(p.y+dragDY,16,H-16);
    updateCross(); draw(); e.preventDefault();
  }
  function up(e){
    if(dragging<0) return;
    Audio.drop(); haptic(5);
    dragging=-1; draw(); e.preventDefault();
  }
  cv.addEventListener("mousedown",down); cv.addEventListener("touchstart",down,{passive:false});
  window.addEventListener("mousemove",move); window.addEventListener("touchmove",move,{passive:false});
  window.addEventListener("mouseup",up); window.addEventListener("touchend",up);

  // keyboard accessibility: Tab cycles a "selected" node, arrows move it
  let kbSel=0;
  window.addEventListener("keydown",e=>{
    if(["ArrowLeft","ArrowRight","ArrowUp","ArrowDown"].includes(e.key)){
      const step=e.shiftKey?20:6;
      const nd=nodes[kbSel]; if(!nd) return;
      if(e.key==="ArrowLeft") nd.x=clamp(nd.x-step,16,W-16);
      if(e.key==="ArrowRight") nd.x=clamp(nd.x+step,16,W-16);
      if(e.key==="ArrowUp") nd.y=clamp(nd.y-step,16,H-16);
      if(e.key==="ArrowDown") nd.y=clamp(nd.y+step,16,H-16);
      updateCross(); draw(); e.preventDefault();
    } else if(e.key==="Tab"){
      kbSel=(kbSel+1)%nodes.length; dragging=kbSel; draw(); e.preventDefault();
    } else if(e.key==="Enter" && $("overlay").classList.contains("show")){
      $("next").click();
    }
  });

  // ---------- flow ----------
  $("next").addEventListener("click", ()=>{
    $("overlay").classList.remove("show");
    level++; store.set("tangle.level",level);
    buildLevel(nodeCountFor(level));
  });
  function nodeCountFor(L){ return Math.min(4+L, 14); } // ramps gently, caps at 14

  // boot
  resize();
  buildLevel(nodeCountFor(level));
  // re-layout if first frame had zero size
  setTimeout(()=>{ if(W<10){ resize(); buildLevel(nodeCountFor(level)); } }, 60);

  // expose a little for self-test
  window.__TANGLE__ = { countCrossings, buildLevel, get nodes(){return nodes}, get edges(){return edges}, nodeCountFor, segCross };
})();
</script>
</body>
</html>
